# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy localhire-B326-worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build
        run: dotnet build LocalHiringPlatform.Worker/LocalHiringPlatform.Worker.csproj --configuration Release

      - name: Clean publish folder
        shell: pwsh
        run: |
          Remove-Item "${{ env.DOTNET_ROOT }}/worker" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Publish
        run: dotnet publish LocalHiringPlatform.Worker/LocalHiringPlatform.Worker.csproj --configuration Release --no-build --output "${{env.DOTNET_ROOT}}/worker"
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: worker-app
          path: ${{ env.DOTNET_ROOT }}/worker

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: worker-app

      - name: Show downloaded files
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID}}
          tenant-id: ${{ secrets.AZURE_TENANT_ID}}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID}}

      - name: Show Azure Account
        shell: pwsh
        run: |
          az account show

      - name: Check Worker App
        shell: pwsh
        run: |
          az webapp show `
            --name localhire-B326-worker `
            --resource-group localhire-B326-rg

      - name: Deploy Worker
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'localhire-B326-worker'
          resource-group-name: 'localhire-B326-rg'
          slot-name: 'Production'
          package: .
          